name: Capture Feedback

on:
  repository_dispatch:
    types:
      - analyze-pr-feedback

jobs:
  capture:
    runs-on: ubuntu-latest
    env:
      RESULT_PATH: /tmp/change-intelligence-feedback.json
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: pip install .

      - name: Write Event Payload
        env:
          CLIENT_PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: printf '%s' "$CLIENT_PAYLOAD" > /tmp/change-intelligence-feedback-event.json

      - name: Capture Feedback
        env:
          NOVYX_API_KEY: ${{ secrets.NOVYX_API_KEY }}
        run: python -m change_intelligence.run_feedback --event-path /tmp/change-intelligence-feedback-event.json --output-path "$RESULT_PATH"

      - name: Workflow Summary
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          result = json.loads(Path(os.environ["RESULT_PATH"]).read_text())
          lines = [
              "# Change Intelligence Feedback",
              "",
              f"- Repository: `{result.get('repository')}`",
              f"- PR: `#{result.get('pull_request_number')}`",
              f"- Feedback: `{result.get('feedback')}`",
              f"- Ignored: `{result.get('ignored', False)}`",
          ]
          Path(os.environ["GITHUB_STEP_SUMMARY"]).write_text("\n".join(lines) + "\n", encoding="utf8")
          PY

      - name: Upload Result Artifact
        uses: actions/upload-artifact@v4
        with:
          name: change-intelligence-feedback-${{ github.run_id }}
          path: ${{ env.RESULT_PATH }}
